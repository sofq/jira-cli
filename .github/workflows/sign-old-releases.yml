name: Sign Old Releases

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        tag: [v0.9.2, v0.9.1, v0.9.0, v0.8.24, v0.8.23]
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ matrix.tag }}" --repo "${{ github.repository }}" --pattern '*.tar.gz' --pattern '*.zip' --pattern 'checksums.txt' --clobber

      - name: Sign checksums
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - name: Upload signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ matrix.tag }}" checksums.txt.sig checksums.txt.pem --repo "${{ github.repository }}" --clobber

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: "*.tar.gz,*.zip,checksums.txt"
