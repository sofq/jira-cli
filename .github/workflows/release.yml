name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.6). Reruns publish jobs for an existing release."
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if manually dispatched — release already exists
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  npm-publish:
    runs-on: ubuntu-latest
    needs: release
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    continue-on-error: true
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: |
          VERSION="${TAG#v}"
          cd npm
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        run: npm publish
        working-directory: npm

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    continue-on-error: true
    environment: pypi-publish
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set version from tag
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

      - name: Build package
        run: |
          pip install build
          cd python && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
