name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./internal/... ./gen/... ./test/e2e/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  integration:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Integration tests
        env:
          JR_BASE_URL: ${{ secrets.JR_BASE_URL }}
          JR_AUTH_TYPE: basic
          JR_AUTH_USER: ${{ secrets.JR_AUTH_USER }}
          JR_AUTH_TOKEN: ${{ secrets.JR_AUTH_TOKEN }}
        run: go test ./test/integration/ -v -timeout 120s
