<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Dark gradient mesh background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%" color-interpolation="linearRGB">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="50%" r="40%" color-interpolation="linearRGB">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="30%" r="35%" color-interpolation="linearRGB">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="90%" cy="80%" r="25%" color-interpolation="linearRGB">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%" color-interpolation="linearRGB">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%" color-interpolation="linearRGB">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <!-- Noise filter -->
    <filter id="noise" color-interpolation-filters="linearRGB" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feBlend in="SourceGraphic" in2="n" mode="overlay" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
    <!-- Dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#a78bfa" opacity="0.06"/>
    </pattern>
  </defs>

  <style>
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes accentDraw {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .title { animation: slideIn 0.6s ease-out both; }
    .tagline { animation: fadeUp 0.5s ease-out 0.3s both; }
    .accent { animation: accentDraw 1s ease-out 0.5s both; stroke-dasharray: 500; }
    .dot-float { animation: pulse 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#glow1)"/>
  <rect width="900" height="280" fill="url(#glow2)"/>
  <rect width="900" height="280" fill="url(#glow3)"/>
  <rect width="900" height="280" fill="url(#dots)"/>

  <!-- Diagonal energy lines -->
  <line x1="580" y1="0" x2="680" y2="280" stroke="#a78bfa" stroke-width="0.5" opacity="0.12"/>
  <line x1="620" y1="0" x2="720" y2="280" stroke="#22d3ee" stroke-width="0.5" opacity="0.12"/>
  <line x1="660" y1="0" x2="760" y2="280" stroke="#a78bfa" stroke-width="0.5" opacity="0.07"/>
  <line x1="700" y1="0" x2="800" y2="280" stroke="#22d3ee" stroke-width="0.5" opacity="0.07"/>

  <!-- Floating geometric accents -->
  <circle cx="720" cy="80" r="40" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.1" class="dot-float"/>
  <circle cx="780" cy="180" r="25" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.12" class="dot-float" style="animation-delay: 1s"/>
  <rect x="820" y="60" width="30" height="30" rx="4" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.12" transform="rotate(15, 835, 75)" class="dot-float" style="animation-delay: 2s"/>

  <!-- Small scattered dots -->
  <circle cx="650" cy="50" r="2" fill="#a78bfa" opacity="0.2" class="dot-float"/>
  <circle cx="750" cy="140" r="2.5" fill="#22d3ee" opacity="0.2" class="dot-float" style="animation-delay: 0.5s"/>
  <circle cx="830" cy="220" r="2" fill="#f59e0b" opacity="0.2" class="dot-float" style="animation-delay: 1.5s"/>
  <circle cx="690" cy="230" r="1.5" fill="#a78bfa" opacity="0.12" class="dot-float" style="animation-delay: 2.5s"/>
  <circle cx="860" cy="120" r="1.5" fill="#22d3ee" opacity="0.12" class="dot-float" style="animation-delay: 0.8s"/>

  <!-- Main title "jr" -->
  <g class="title">
    <text x="100" y="145" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="url(#textGrad)" letter-spacing="-4">jr</text>
  </g>

  <!-- Accent line under title -->
  <line x1="95" y1="165" x2="595" y2="165" stroke="url(#accentLine)" stroke-width="2" class="accent"/>

  <!-- Tagline -->
  <g class="tagline">
    <text x="105" y="200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#cbd5e1" font-weight="400" letter-spacing="0.5">The Jira CLI that speaks JSON</text>
    <text x="105" y="228" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#64748b" font-weight="400" letter-spacing="0.5">built for AI agents</text>
  </g>

  <!-- Amber accent dot -->
  <circle cx="245" cy="150" r="5" fill="#f59e0b" opacity="0.5" class="dot-float"/>
</svg>
