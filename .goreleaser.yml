version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - binary: jr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/sofq/jira-cli/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - name: jr
    repository:
      owner: sofq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/sofq/jira-cli
    description: Agent-friendly Jira CLI with structured JSON output and jq filtering
    license: MIT
    install: |
      bin.install "jr"
    test: |
      system "#{bin}/jr", "version"
